<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeCore</title>

  <!-- Phosphor Icons (single family: UI chrome + device-type icons).
       Replaced Material Icons + Material Design Icons. -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.x/src/regular/style.css" />

  <!-- App styles: structural sheet first, identity layer after.
       identity.css carries tokens (type, accent, canvas, atmosphere)
       and motion polish; main.css carries layout + components. -->
  <link data-trunk rel="css" href="style/main.css" />
  <link data-trunk rel="css" href="style/identity.css" />

  <!-- Trunk injects the WASM bundle here -->
  <link data-trunk rel="rust" data-wasm-opt="z" />
</head>
<body></body>
</html>
