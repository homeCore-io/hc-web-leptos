# CI for hc-web-leptos.
#
# Mirrors the plugins' ci.yml shape: same shared rust-ci.yml in
# hc-scripts. fmt + tests run on the host target — the tz module
# (the only test surface today) is platform-independent. Clippy is
# disabled because the codebase carries ~66 stylistic lints
# accumulated pre-CI; cleanup tracked separately as LEPTOS-CLP-1
# in release_0_1_4.md (or its successor). Re-enable
# `run_clippy: true` once those land.
#
# WASM target verification is implicit via the eventual `trunk
# build` deploy step (not yet a CI job). Adding an explicit
# `cargo check --target wasm32-unknown-unknown` matrix is a
# possible follow-up if the host check ever stops catching
# wasm-only regressions.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: homeCore-io/hc-scripts/.github/workflows/rust-ci.yml@main
    with:
      rust_version: "1.95"
      run_clippy: false
    secrets: inherit

  # ── Cascade: when develop CI is green, fire a repository_dispatch at
  # homeCore-io/homeCore so its release workflow rebuilds hc-core:dev
  # with the new leptos commit bundled. Without this, a leptos-only fix
  # never reaches the dev appliance — hc-core:dev would keep bundling
  # the previous WASM until a separate core commit lands.
  #
  # Skipped on PRs and main pushes; only develop participates in the
  # dev-image cascade. Pre-flight check exits cleanly when the PAT is
  # missing so unconfigured forks don't fail.
  dispatch-core:
    name: Cascade to homeCore release
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Pre-flight — token present
        run: |
          if [ -z "${{ secrets.CROSS_REPO_DISPATCH_PAT }}" ]; then
            echo "::warning::CROSS_REPO_DISPATCH_PAT not set; core cascade skipped."
            exit 0
          fi
      - name: Fire repository_dispatch on homeCore-io/homeCore
        if: ${{ secrets.CROSS_REPO_DISPATCH_PAT != '' }}
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_DISPATCH_PAT }}
        run: |
          gh api repos/homeCore-io/homeCore/dispatches \
            --method POST \
            -f event_type=webui-updated \
            --field "client_payload[sha]=${{ github.sha }}" \
            --field "client_payload[source_repo]=${{ github.repository }}"
