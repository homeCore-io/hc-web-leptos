[build]
target = "index.html"

# Cargo re-resolves on every wasm build with the meta-layout [patch]
# overrides active, which touches Cargo.lock. Without this ignore the
# trunk watcher sees the lock change and triggers another build → loop.
[watch]
ignore = ["Cargo.lock"]

[serve]
addresses = ["0.0.0.0"]
port = 3000

# Proxy /api (HTTP) and /api/v1/events/stream (WebSocket) to the HomeCore server.
# Default: http://10.0.10.200:8080
[[proxy]]
rewrite = "/api"
backend = "http://10.0.10.200:8080/api"

[[proxy]]
rewrite = "/api/v1/events/stream"
backend = "ws://10.0.10.200:8080/api/v1/events/stream"
ws      = true

[[proxy]]
rewrite = "/api/v1/logs/stream"
backend = "ws://10.0.10.200:8080/api/v1/logs/stream"
ws      = true
